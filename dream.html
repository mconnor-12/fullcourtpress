<!-- FULL COURT RACE TRACKER - Multi-User Edition
  
  SETUP INSTRUCTIONS:
  1. Create new Google Sheet
  2. Tools → Script Editor
  3. Paste the Google Apps Script code from the Setup tab
  4. Deploy as Web App (Execute as: Me, Access: Anyone)
  5. Copy the deployment URL and paste it in Setup tab
  6. Create these sheets: Students, Log, Points, Seating, Manual_Adjustments
  
  NEW FEATURES:
  - 25 points max per category (was 1-3 points)
  - +5 bonus button for extra credit
  - Multi-user support (no conflicts)
  - Roster view (sort by first/last name, homeroom, points)
  - Add student feature
  - Manual save button + auto-sync every 30s
  - Better seating chart with auto-save
  - All data stored in Google Sheets (no local storage)
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏀 Full Court Race — Multi-User</title>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// Configuration
const SCRIPT_URL_KEY = 'fcr_script_v2';
const MAX_POINTS_PER_CATEGORY = 25;
const BONUS_POINTS = 5;

const CATEGORIES = [
  {id: 'focus', name: 'Focus', icon: '🎯'},
  {id: 'effort', name: 'Effort', icon: '💪'},
  {id: 'show_work', name: 'Show All Work', icon: '📝'},
  {id: 'accuracy', name: 'Accuracy', icon: '✓'},
  {id: 'word_problems', name: 'Word Problems', icon: '📖'},
  {id: 'pacing', name: 'Strong Pacing', icon: '⚡'},
  {id: 'participation', name: 'Participation', icon: '🙋'},
  {id: 'leadership', name: 'Leadership', icon: '👑'},
  {id: 'habits', name: 'Habits', icon: '⭐'},
  {id: 'mastery', name: 'Mastery', icon: '🏆'}
];

const HOMEROOMS = [
  {id: 'Columbia', name: 'Columbia', color: '#4dd8ef', icon: '💧'},
  {id: 'Emory', name: 'Emory', color: '#ff7048', icon: '🔥'},
  {id: 'Vanderbilt', name: 'Vanderbilt', color: '#7cbd52', icon: '🌿'}
];

const QUARTERS = ['Q1', 'Q2', 'Q3', 'Q4'];

function App() {
  const [scriptUrl, setScriptUrl] = useState(localStorage.getItem(SCRIPT_URL_KEY) || '');
  const [students, setStudents] = useState({});
  const [points, setPoints] = useState({});
  const [seating, setSeating] = useState({Columbia:[], Emory:[], Vanderbilt:[]});
  const [pendingSaves, setPendingSaves] = useState([]);
  const [syncStatus, setSyncStatus] = useState('offline');
  const [currentView, setCurrentView] = useState('scoreboard');
  const [rosterSort, setRosterSort] = useState('first');
  const [rosterHomeroom, setRosterHomeroom] = useState('all');
  
  // Google Sheets integration
  const callSheet = useCallback(async (action, data = {}) => {
    if (!scriptUrl) return null;
    
    try {
      setSyncStatus('syncing');
      const response = await fetch(scriptUrl + '?action=' + action, {
        method: 'POST',
        body: JSON.stringify(data)
      });
      
      const result = await response.json();
      setSyncStatus('ok');
      return result;
    } catch (error) {
      console.error('Sheet error:', error);
      setSyncStatus('error');
      return null;
    }
  }, [scriptUrl]);
  
  // Load data from sheet
  const loadData = useCallback(async () => {
    const result = await callSheet('getState');
    if (!result) return;
    
    if (result.students) {
      const studentsMap = {};
      result.students.forEach(s => {
        const [first, ...lastParts] = s.name.split(' ');
        studentsMap[s.id] = {
          ...s,
          firstName: first,
          lastName: lastParts.join(' ')
        };
      });
      setStudents(studentsMap);
    }
    
    if (result.points) setPoints(result.points);
    if (result.seating) setSeating(result.seating);
  }, [callSheet]);
  
  // Add points
  const addPoints = useCallback((studentId, quarter, category, amount) => {
    const student = students[studentId];
    if (!student) return;
    
    // Add to pending queue
    setPendingSaves(prev => [...prev, {
      timestamp: new Date().toISOString(),
      studentId,
      studentName: student.name,
      homeroom: student.homeroom,
      quarter,
      category,
      points: amount
    }]);
    
    // Update local state optimistically
    setPoints(prev => {
      const newPoints = {...prev};
      if (!newPoints[studentId]) {
        newPoints[studentId] = {};
        QUARTERS.forEach(q => {
          newPoints[studentId][q] = {};
          CATEGORIES.forEach(c => newPoints[studentId][q][c.id] = 0);
        });
      }
      
      const current = newPoints[studentId][quarter][category] || 0;
      newPoints[studentId][quarter][category] = Math.min(MAX_POINTS_PER_CATEGORY, current + amount);
      
      return newPoints;
    });
  }, [students]);
  
  // Manual save
  const manualSave = useCallback(async () => {
    if (pendingSaves.length === 0) return;
    
    const result = await callSheet('batchAddPoints', {entries: pendingSaves});
    if (result && result.success) {
      setPendingSaves([]);
    }
  }, [pendingSaves, callSheet]);
  
  // Add student
  const addStudent = useCallback(async (name, homeroom) => {
    const result = await callSheet('addStudent', {name, homeroom});
    if (result && result.success) {
      await loadData();
    }
  }, [callSheet, loadData]);
  
  // Auto-save every 30 seconds
  useEffect(() => {
    if (pendingSaves.length === 0) return;
    
    const timer = setTimeout(manualSave, 30000);
    return () => clearTimeout(timer);
  }, [pendingSaves, manualSave]);
  
  // Auto-load every 10 seconds
  useEffect(() => {
    if (!scriptUrl) return;
    
    loadData();
    const interval = setInterval(loadData, 10000);
    return () => clearInterval(interval);
  }, [scriptUrl, loadData]);
  
  // Save script URL
  useEffect(() => {
    if (scriptUrl) {
      localStorage.setItem(SCRIPT_URL_KEY, scriptUrl);
    }
  }, [scriptUrl]);
  
  // Render different views
  const renderView = () => {
    switch(currentView) {
      case 'scoreboard': return <ScoreboardView students={students} points={points} />;
      case 'roster': return <RosterView students={students} points={points} rosterSort={rosterSort} setRosterSort={setRosterSort} rosterHomeroom={rosterHomeroom} setRosterHomeroom={setRosterHomeroom} onAddPoints={addPoints} />;
      case 'seating': return <SeatingView students={students} seating={seating} setSeating={setSeating} callSheet={callSheet} />;
      case 'setup': return <SetupView scriptUrl={scriptUrl} setScriptUrl={setScriptUrl} />;
      default: return null;
    }
  };
  
  return (
    <div style={{minHeight:'100vh',background:'#0a0d14',color:'#e2e6f2',fontFamily:'system-ui'}}>
      {/* Nav */}
      <div style={{background:'#121620',borderBottom:'1px solid rgba(255,255,255,.06)',padding:'12px 20px',display:'flex',alignItems:'center',gap:'20px'}}>
        <div style={{fontSize:'16px',fontWeight:'800'}}>🏀 FULL COURT RACE</div>
        
        <div style={{display:'flex',gap:'8px'}}>
          {['scoreboard', 'roster', 'seating', 'setup'].map(tab => (
            <button
              key={tab}
              onClick={() => setCurrentView(tab)}
              style={{
                background: currentView === tab ? '#d4752a' : 'transparent',
                color: currentView === tab ? '#0a0d14' : '#8591ab',
                border: 'none',
                padding: '8px 16px',
                borderRadius: '6px',
                cursor: 'pointer',
                fontWeight: '600',
                fontSize: '12px',
                textTransform: 'capitalize'
              }}
            >
              {tab}
            </button>
          ))}
        </div>
        
        <div style={{marginLeft:'auto',display:'flex',gap:'12px',alignItems:'center'}}>
          <button
            onClick={manualSave}
            disabled={pendingSaves.length === 0}
            style={{
              background: pendingSaves.length > 0 ? '#f04a5a' : '#2ecc8a',
              color: '#0a0d14',
              border: 'none',
              padding: '8px 16px',
              borderRadius: '6px',
              fontWeight: '700',
              fontSize: '12px',
              cursor: pendingSaves.length > 0 ? 'pointer' : 'not-allowed',
              opacity: pendingSaves.length > 0 ? 1 : 0.5
            }}
          >
            💾 {pendingSaves.length > 0 ? `Save (${pendingSaves.length})` : 'Saved'}
          </button>
          
          <div style={{fontSize:'11px',color:'#8591ab',display:'flex',alignItems:'center',gap:'6px'}}>
            <div style={{
              width:'8px',
              height:'8px',
              borderRadius:'50%',
              background: syncStatus === 'ok' ? '#2ecc8a' : syncStatus === 'syncing' ? '#ffd166' : '#404a63'
            }}/>
            {syncStatus === 'ok' ? 'Synced' : syncStatus === 'syncing' ? 'Syncing...' : 'Offline'}
          </div>
        </div>
      </div>
      
      {/* Content */}
      <div style={{padding:'20px'}}>
        {renderView()}
      </div>
    </div>
  );
}

// Scoreboard View
function ScoreboardView({students, points}) {
  const homerooms = HOMEROOMS.map(hr => {
    const hrStudents = Object.values(students).filter(s => s.homeroom === hr.id);
    const total = hrStudents.reduce((sum, s) => {
      const studentPoints = points[s.id] || {};
      return sum + QUARTERS.reduce((qSum, q) => {
        const qData = studentPoints[q] || {};
        return qSum + Object.values(qData).reduce((cSum, v) => cSum + (Number(v) || 0), 0);
      }, 0);
    }, 0);
    
    return {...hr, total, studentCount: hrStudents.length};
  }).sort((a,b) => b.total - a.total);
  
  return (
    <div style={{maxWidth:'1200px',margin:'0 auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'16px'}}>
        {homerooms.map((hr, idx) => (
          <div
            key={hr.id}
            style={{
              background:'#121620',
              border:`2px solid ${idx === 0 ? hr.color : 'rgba(255,255,255,.06)'}`,
              borderRadius:'12px',
              padding:'24px',
              position:'relative',
              boxShadow: idx === 0 ? `0 8px 24px ${hr.color}33` : 'none'
            }}
          >
            {idx === 0 && (
              <div style={{position:'absolute',top:'8px',right:'12px',fontSize:'10px',fontWeight:'800',color:'#f0b429'}}>
                🏆 LEADING
              </div>
            )}
            
            <div style={{fontSize:'48px',marginBottom:'8px'}}>{hr.icon}</div>
            <div style={{fontSize:'20px',fontWeight:'800',color:hr.color,marginBottom:'4px'}}>{hr.name}</div>
            <div style={{fontSize:'12px',color:'#8591ab',marginBottom:'16px'}}>{hr.studentCount} students</div>
            <div style={{fontSize:'48px',fontWeight:'800',color:'#e2e6f2'}}>{hr.total}</div>
            <div style={{fontSize:'11px',color:'#8591ab',marginTop:'4px'}}>total points</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// Roster View
function RosterView({students, points, rosterSort, setRosterSort, rosterHomeroom, setRosterHomeroom, onAddPoints}) {
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [selectedQuarter, setSelectedQuarter] = useState('Q1');
  
  let studentList = Object.values(students);
  
  // Filter
  if (rosterHomeroom !== 'all') {
    studentList = studentList.filter(s => s.homeroom === rosterHomeroom);
  }
  
  // Sort
  studentList.sort((a,b) => {
    if (rosterSort === 'first') return a.firstName.localeCompare(b.firstName);
    if (rosterSort === 'last') return a.lastName.localeCompare(b.lastName);
    if (rosterSort === 'homeroom') return a.homeroom.localeCompare(b.homeroom);
    if (rosterSort === 'points') {
      const ptsA = getStudentTotal(a.id, points);
      const ptsB = getStudentTotal(b.id, points);
      return ptsB - ptsA;
    }
    return 0;
  });
  
  const renderStudentPanel = () => {
    if (!selectedStudent) return null;
    
    const student = students[selectedStudent];
    const studentPoints = points[selectedStudent] || {};
    const quarterData = studentPoints[selectedQuarter] || {};
    
    return (
      <div style={{
        position:'fixed',
        top:0,left:0,right:0,bottom:0,
        background:'rgba(10,13,20,.95)',
        display:'flex',
        alignItems:'center',
        justifyContent:'center',
        zIndex:1000
      }}>
        <div style={{
          background:'#121620',
          border:'2px solid rgba(255,255,255,.1)',
          borderRadius:'16px',
          padding:'32px',
          maxWidth:'800px',
          width:'90%',
          maxHeight:'80vh',
          overflow:'auto'
        }}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:'24px'}}>
            <div>
              <div style={{fontSize:'24px',fontWeight:'800',marginBottom:'4px'}}>{student.name}</div>
              <div style={{fontSize:'14px',color:'#8591ab'}}>{student.homeroom}</div>
            </div>
            <button onClick={() => setSelectedStudent(null)} style={{background:'#1f2537',color:'#e2e6f2',border:'none',padding:'8px 16px',borderRadius:'6px',cursor:'pointer'}}>✕ Close</button>
          </div>
          
          {/* Quarter selector */}
          <div style={{display:'flex',gap:'8px',marginBottom:'24px'}}>
            {QUARTERS.map(q => (
              <button
                key={q}
                onClick={() => setSelectedQuarter(q)}
                style={{
                  background: selectedQuarter === q ? '#d4752a' : '#1f2537',
                  color: selectedQuarter === q ? '#0a0d14' : '#e2e6f2',
                  border:'none',
                  padding:'8px 16px',
                  borderRadius:'6px',
                  cursor:'pointer',
                  fontWeight:'700'
                }}

              </button>
            ))}
          </div>
          
          {/* Categories */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'16px'}}>
            {CATEGORIES.map(cat => {
              const current = quarterData[cat.id] || 0;
              const percentage = (current / MAX_POINTS_PER_CATEGORY) * 100;
              
              return (
                <div key={cat.id} style={{background:'#1f2537',borderRadius:'8px',padding:'16px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
                    <div>
                      <div style={{fontSize:'14px',fontWeight:'700'}}>{cat.icon} {cat.name}</div>
                      <div style={{fontSize:'20px',fontWeight:'800',color:'#d4752a',marginTop:'4px'}}>
                        {current}/{MAX_POINTS_PER_CATEGORY}
                      </div>
                    </div>
                  </div>
                  
                  {/* Progress bar */}
                  <div style={{background:'#0a0d14',borderRadius:'4px',height:'8px',overflow:'hidden',marginBottom:'12px'}}>
                    <div style={{background:'#d4752a',height:'100%',width:`${percentage}%`,transition:'width .3s'}}/>
                  </div>
                  
                  {/* Add buttons */}
                  <div style={{display:'flex',gap:'8px'}}>
                    <button
                      onClick={() => onAddPoints(selectedStudent, selectedQuarter, cat.id, 5)}
                      disabled={current >= MAX_POINTS_PER_CATEGORY}
                      style={{
                        flex:1,
                        background: current >= MAX_POINTS_PER_CATEGORY ? '#404a63' : '#2ecc8a',
                        color: current >= MAX_POINTS_PER_CATEGORY ? '#8591ab' : '#0a0d14',
                        border:'none',
                        padding:'6px 12px',
                        borderRadius:'4px',
                        cursor: current >= MAX_POINTS_PER_CATEGORY ? 'not-allowed' : 'pointer',
                        fontWeight:'700',
                        fontSize:'11px'
                      }}
                    >
                      +5
                    </button>
                    <button
                      onClick={() => onAddPoints(selectedStudent, selectedQuarter, cat.id, BONUS_POINTS)}
                      style={{
                        background:'#f0b429',

  return (

              {HOMEROOMS.map(hr => <option key={hr.id} value={hr.id}>{hr.name}</option>)}
            </select>
          </div>
        </div>
        
        <div style={{background:'#121620',borderRadius:'12px',overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr style={{background:'#1f2537'}}>
                <th style={{padding:'12px 16px',textAlign:'left',fontSize:'11px',fontWeight:'700',color:'#8591ab'}}>Name</th>
                <th style={{padding:'12px 16px',textAlign:'left',fontSize:'11px',fontWeight:'700',color:'#8591ab'}}>Homeroom</th>
                {QUARTERS.map(q => <th key={q} style={{padding:'12px 16px',textAlign:'center',fontSize:'11px',fontWeight:'700',color:'#8591ab'}}>{q}</th>)}
                <th style={{padding:'12px 16px',textAlign:'center',fontSize:'11px',fontWeight:'700',color:'#8591ab'}}>Total</th>
                <th style={{padding:'12px 16px',textAlign:'center',fontSize:'11px',fontWeight:'700',color:'#8591ab'}}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {studentList.map(s => {
                const studentPoints = points[s.id] || {};
                const quarterTotals = QUARTERS.map(q => {
                  const qData = studentPoints[q] || {};
                  return Object.values(qData).reduce((sum,v) => sum + (Number(v)||0), 0);
                });
                const total = quarterTotals.reduce((sum,v) => sum + v, 0);
                
                return (
                  <tr key={s.id} style={{borderBottom:'1px solid rgba(255,255,255,.06)'}}>
                    <td style={{padding:'12px 16px',fontSize:'13px',fontWeight:'600'}}>{s.name}</td>
                    <td style={{padding:'12px 16px',fontSize:'12px',color:'#8591ab'}}>{s.homeroom}</td>
                    {quarterTotals.map((qt,i) => <td key={i} style={{padding:'12px 16px',textAlign:'center',fontSize:'13px'}}>{qt}</td>)}
                    <td style={{padding:'12px 16px',textAlign:'center',fontSize:'14px',fontWeight:'800',color:'#d4752a'}}>{total}</td>
                    <td style={{padding:'12px 16px',textAlign:'center'}}>
                      <button onClick={() => setSelectedStudent(s.id)} style={{background:'#d4752a',color:'#0a0d14',border:'none',padding:'6px 14px',borderRadius:'4px',cursor:'pointer',fontSize:'11px',fontWeight:'700'}}>
                        Add Points
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      
      {renderStudentPanel()}
    </>
  );
}

function SetupView({scriptUrl, setScriptUrl}) {
  return (

      <div style={{fontSize:'24px',fontWeight:'800',marginBottom:'24px'}}>⚙️ Setup</div>
      
      <div style={{background:'#121620',borderRadius:'12px',padding:'24px',marginBottom:'24px'}}>
        <div style={{fontSize:'16px',fontWeight:'700',marginBottom:'12px'}}>Google Sheets URL</div>

          }}
        />

        </div>

        </div>
        <pre style={{background:'#0a0d14',color:'#2ecc8a',padding:'16px',borderRadius:'6px',fontSize:'11px',overflow:'auto',maxHeight:'400px'}}>
{`function doPost(e) {
  const data = JSON.parse(e.postData.contents);
  const action = e.parameter.action;
  
  if (action === 'getState') return getState_();
  if (action === 'batchAddPoints') return batchAddPoints_(data);
  if (action === 'addStudent') return addStudent_(data);
  if (action === 'updateSeating') return updateSeating_(data);
  
  return ContentService.createTextOutput(JSON.stringify({error: 'Unknown action'}))
    .setMimeType(ContentService.MimeType.JSON);
}

function getState_() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  
  // Load students
  const studentsSheet = ss.getSheetByName('Students') || ss.insertSheet('Students');
  const studentsData = studentsSheet.getDataRange().getValues();
  const students = [];
  for (let i = 1; i < studentsData.length; i++) {
    if (studentsData[i][0]) {
      students.push({
        id: studentsData[i][0],
        name: studentsData[i][1],
        homeroom: studentsData[i][2]
      });
    }
  }
  
  // Calculate points from log
  const logSheet = ss.getSheetByName('Log') || ss.insertSheet('Log');
  const logData = logSheet.getDataRange().getValues();
  const points = {};
  
  for (let i = 1; i < logData.length; i++) {
    const [timestamp, studentId, studentName, homeroom, quarter, category, pts] = logData[i];
    if (!studentId) continue;
    
    if (!points[studentId]) {
      points[studentId] = {Q1:{}, Q2:{}, Q3:{}, Q4:{}};
    }
    
    if (!points[studentId][quarter]) points[studentId][quarter] = {};
    if (!points[studentId][quarter][category]) points[studentId][quarter][category] = 0;
    
    points[studentId][quarter][category] += Number(pts) || 0;
  }
  
  // Load seating
  const seatingSheet = ss.getSheetByName('Seating') || ss.insertSheet('Seating');
  const seatingData = seatingSheet.getDataRange().getValues();
  const seating = {Columbia:[], Emory:[], Vanderbilt:[]};
  
  for (let i = 1; i < seatingData.length; i++) {
    if (seatingData[i][0] && seatingData[i][1]) {
      try {
        seating[seatingData[i][0]] = JSON.parse(seatingData[i][1]);
      } catch(e) {}
    }
  }
  
  return ContentService.createTextOutput(JSON.stringify({students, points, seating}))
    .setMimeType(ContentService.MimeType.JSON);
}

function batchAddPoints_(data) {

function addStudent_(data) {

function updateSeating_(data) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const seatingSheet = ss.getSheetByName('Seating') || ss.insertSheet('Seating');
  
  if (seatingSheet.getLastRow() === 0) {
    seatingSheet.appendRow(['Homeroom', 'Layout']);
  }
  
  const values = seatingSheet.getDataRange().getValues();
  let found = false;
  
  for (let i = 1; i < values.length; i++) {
    if (values[i][0] === data.homeroom) {
      seatingSheet.getRange(i + 1, 2).setValue(JSON.stringify(data.layout));
      found = true;
      break;
    }
  }
  
  if (!found) {
    seatingSheet.appendRow([data.homeroom, JSON.stringify(data.layout)]);
  }

function getStudentTotal(studentId, points) {
  const studentPoints = points[studentId] || {};
  return QUARTERS.reduce((sum, q) => {
    const qData = studentPoints[q] || {};
    return sum + Object.values(qData).reduce((cSum, v) => cSum + (Number(v) || 0), 0);
  }, 0);
}
